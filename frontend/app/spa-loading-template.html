<style>
  #spa-loader {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #1F0A4B;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 26px;
  }
  #spa-loader img {
    width: 64px;
    height: auto;
    opacity: 0.9;
    animation: spa-pulse 1.4s ease-in-out infinite;
  }
  #spa-spinner {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(255, 255, 255, 0.12);
    border-top-color: rgba(255, 255, 255, 0.7);
    border-radius: 50%;
    animation: spa-spin 0.8s linear infinite;
  }
  @keyframes spa-spin {
    to { transform: rotate(360deg); }
  }
  @keyframes spa-pulse {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 1; }
  }
</style>
<div id="spa-loader">
  <img src="/logo-icon.png" alt="" />
  <div id="spa-spinner"></div>
</div>
