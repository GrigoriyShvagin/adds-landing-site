<svg width="110" height="95" viewBox="0 0 110 95" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark navy Г-bracket: left vertical bar + top horizontal bar -->
  <rect x="0" y="0" width="22" height="95" fill="#1B3C8C"/>
  <rect x="22" y="0" width="44" height="18" fill="#1B3C8C"/>

  <!-- Red house: triangle roof + rectangular body -->
  <polygon points="22,45 41,21 60,45" fill="#CC1212"/>
  <rect x="24" y="44" width="34" height="26" fill="#CC1212"/>

  <!-- Gray skyscraper: rectangular body + triangle cap -->
  <rect x="70" y="10" width="24" height="70" fill="#8C8C8C"/>
  <polygon points="70,11 82,1 94,11" fill="#8C8C8C"/>
</svg>
